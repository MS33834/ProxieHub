name: Update Nodes

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "update-nodes"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        env:
          PROXIEHUB_VERIFY_NODES: "true"
          PROXIEHUB_GEO_ENABLED: "false"
          PROXIEHUB_MAX_NODES: "800"
          PROXIEHUB_MAX_PROXIES: "300"
        run: python scripts/update.py --verify

      - name: Run tests
        run: make test

      - name: Commit and push changes to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily node update"
            git push
          fi

      - name: Sync to GitCode
        if: ${{ env.GITCODE_TOKEN != '' }}
        run: |
          git remote add gitcode https://gitcode.com/badhope/ProxieHub.git || true
          git fetch gitcode main || true
          git config --local credential.helper store
          printf 'url=https://gitcode.com/badhope/ProxieHub.git\nusername=oauth2\npassword=%s\n' "$GITCODE_TOKEN" | git credential approve
          git push gitcode main
          git credential reject <<'EOF'
          url=https://gitcode.com/badhope/ProxieHub.git
          EOF
