name: Bug 报告
description: 报告脚本、文档或自动化流程中的缺陷
title: "[BUG] "
labels: ["bug"]
body:
  - type: checkboxes
    id: searched
    attributes:
      label: 是否已经搜索过现有 issue？
      description: 在提交前请先搜索 [Issues](../../issues)，避免重复报告。
      options:
        - label: 我已经搜索过现有 issue，确认没有重复报告
          required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰、简洁地描述你遇到的 Bug。
      placeholder: "运行 update.py 时抛出异常 / CI 工作流失败 / 文档链接失效"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请提供最小可复现步骤，包括执行的命令和配置。
      placeholder: |
        1. 克隆仓库
        2. 运行 `python3 scripts/update.py --verify`
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生的结果。
      placeholder: "脚本应正常完成并生成 nodes/clash.yaml"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Python 版本、分支或工作流运行 ID。
      placeholder: "Ubuntu 22.04 / Python 3.11 / main"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 如有错误日志，请先脱敏（删除 token、Cookie、邮箱等）再粘贴。
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 额外确认
      options:
        - label: 我没有在日志或截图中暴露任何密钥或个人节点列表
          required: true
