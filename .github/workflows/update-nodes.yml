name: Update Nodes

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        run: python scripts/update.py

      - name: Run tests
        run: python tests/test_parser.py

      - name: Commit and push changes to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily node update [skip ci]"
            git push
          fi

      - name: Sync to GitCode
        # Skip this step if the GITCODE_TOKEN secret is not configured.
        if: ${{ secrets.GITCODE_TOKEN != '' }}
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          git remote add gitcode https://oauth2:${GITCODE_TOKEN}@gitcode.com/badhope/ProxieHub.git || true
          git fetch gitcode main || true
          git push gitcode main
